<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelle Looknauth | All Star & Joseph Rowe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d1b2a;--blue:#1a5276;--sky:#2e86c1;--accent:#85c1e9;--gold:#c9a84c;--white:#f8f9fa}
body{min-height:100vh;background:var(--navy);font-family:'Jost',sans-serif;color:var(--white);display:flex;align-items:center;justify-content:center;padding:24px 16px;background-image:radial-gradient(ellipse at 20% 20%,rgba(46,134,193,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(26,82,118,.2) 0%,transparent 60%)}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;overflow:hidden;backdrop-filter:blur(20px);animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card-header{background:linear-gradient(135deg,var(--blue) 0%,var(--navy) 100%);padding:28px 24px 0;text-align:center}
.logo-wrap{margin-bottom:20px}.logo-wrap img{height:48px;width:auto;border-radius:4px}
.photo-ring{width:120px;height:120px;border-radius:50%;border:3px solid var(--gold);overflow:hidden;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.photo-ring img{width:100%;height:100%;object-fit:cover}
.name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:.04em;margin-top:16px;line-height:1.1}
.title{font-size:.78rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-top:6px}
.orgs{margin-top:10px;padding-bottom:24px}
.org-badge{display:inline-block;font-size:.7rem;letter-spacing:.06em;color:var(--accent);background:rgba(46,134,193,.15);border:1px solid rgba(46,134,193,.3);border-radius:20px;padding:3px 12px;margin:3px 2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.contact-list{padding:20px;display:flex;flex-direction:column;gap:4px}
.contact-row{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:12px;text-decoration:none;color:var(--white);transition:background .2s}
.contact-row:hover{background:rgba(255,255,255,.07)}
.contact-icon{font-size:1.1rem;width:28px;text-align:center;flex-shrink:0}
.contact-detail{display:flex;flex-direction:column;gap:1px}
.contact-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);opacity:.8}
.contact-value{font-size:.92rem;font-weight:300}
.save-btn{display:block;margin:4px 20px 24px;padding:15px;background:linear-gradient(135deg,var(--sky),var(--blue));color:#fff;text-align:center;border-radius:14px;font-size:.85rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;box-shadow:0 4px 20px rgba(46,134,193,.35);transition:transform .15s,box-shadow .15s;cursor:pointer;border:none;width:calc(100% - 40px);font-family:'Jost',sans-serif}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(46,134,193,.45)}
.footer{text-align:center;font-size:.65rem;color:rgba(255,255,255,.3);padding-bottom:20px;letter-spacing:.08em}
</style>
</head>
